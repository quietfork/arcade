<?xml version="1.0" encoding="UTF-8"?>
<!--
  GitHub repo social preview — 1280x640
  Used by GitHub when the repo URL is shared on social. Upload via repo Settings → Social preview.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="Arcade — multi-pane workspace for Claude Code">
  <defs>
    <radialGradient id="bgGrad2" cx="35%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
    <filter id="markShadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bgGrad2)"/>

  <!-- Subtle grid texture -->
  <g opacity="0.04" stroke="#D9C9A8" stroke-width="1">
    <line x1="0" y1="213" x2="1280" y2="213"/>
    <line x1="0" y1="427" x2="1280" y2="427"/>
    <line x1="427" y1="0" x2="427" y2="640"/>
    <line x1="853" y1="0" x2="853" y2="640"/>
  </g>

  <!-- Mark -->
  <g transform="translate(160 140) scale(1.41)" filter="url(#markShadow2)">
    <path fill-rule="evenodd" fill="#D9C9A8"
          d="M 64 220 L 64 96 A 64 64 0 0 1 192 96 L 192 220 L 64 220 Z M 100 220 L 100 96 A 28 28 0 0 1 156 96 L 156 220 Z"/>
    <circle cx="128" cy="132" r="15" fill="#D9C9A8"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="325"
        font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-weight="700" font-size="148" letter-spacing="-4"
        fill="#D9C9A8">Arcade</text>

  <!-- Tagline -->
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-weight="500" fill="#9C9C9C">
    <text x="600" y="385" font-size="27">Multi-pane workspace for Claude Code.</text>
    <text x="600" y="418" font-size="27">Parallel sessions with tmux-style splits.</text>
  </g>

  <!-- Footer / URL -->
  <text x="1220" y="605"
        font-family="JetBrains Mono, ui-monospace, monospace" font-size="18" fill="#6E6E6E"
        text-anchor="end">github.com/quietfork/arcade</text>
</svg>
