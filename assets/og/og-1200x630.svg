<?xml version="1.0" encoding="UTF-8"?>
<!--
  Open Graph image — 1200x630
  Used in Twitter cards, LinkedIn previews, Slack unfurls, Discord embeds.
  Composition: mark on the left, wordmark + tagline on the right, github URL bottom-right.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Arcade — multi-pane workspace for Claude Code">
  <defs>
    <radialGradient id="bgGrad" cx="35%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
    <filter id="markShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid texture (very faint, hints at terminal panes) -->
  <g opacity="0.04" stroke="#D9C9A8" stroke-width="1">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- Mark: the arch + dot, beige on the dark bg, scaled up to ~360px -->
  <g transform="translate(140 135) scale(1.41)" filter="url(#markShadow)">
    <path fill-rule="evenodd" fill="#D9C9A8"
          d="M 64 220 L 64 96 A 64 64 0 0 1 192 96 L 192 220 L 64 220 Z M 100 220 L 100 96 A 28 28 0 0 1 156 96 L 156 220 Z"/>
    <circle cx="128" cy="132" r="15" fill="#D9C9A8"/>
  </g>

  <!-- Wordmark: "Arcade" -->
  <text x="560" y="320"
        font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-weight="700" font-size="142" letter-spacing="-4"
        fill="#D9C9A8">Arcade</text>

  <!-- Tagline (two lines for breathing room) -->
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-weight="500" fill="#9C9C9C">
    <text x="560" y="378" font-size="26">Multi-pane workspace for Claude Code.</text>
    <text x="560" y="410" font-size="26">Parallel sessions with tmux-style splits.</text>
  </g>

  <!-- Footer / URL -->
  <text x="1140" y="595"
        font-family="JetBrains Mono, ui-monospace, monospace" font-size="18" fill="#6E6E6E"
        text-anchor="end">github.com/quietforkTsuruta0821/arcade</text>
</svg>
